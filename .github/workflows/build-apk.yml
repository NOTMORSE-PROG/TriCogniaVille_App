name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: GDScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gdtoolkit
        run: pip install 'gdtoolkit==4.*'

      - name: Lint GDScript
        run: gdlint scripts/

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Godot 4.6.1
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip
          sudo mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install export templates
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          unzip -q Godot_v4.6.1-stable_export_templates.tpz -d /tmp/tpz
          mv /tmp/tpz/templates/* ~/.local/share/godot/export_templates/4.6.1.stable/

      - name: Install Android build template
        run: |
          mkdir -p android/build
          unzip -q ~/.local/share/godot/export_templates/4.6.1.stable/android_source.zip -d android/build
          touch android/build/.gdignore

      - name: Configure editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.6.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$JAVA_HOME"
          EOF

      - name: Setup release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore
          mkdir -p .godot
          cat > .godot/export_credentials.cfg << EOF
          [preset.0]

          [preset.0.options]
          keystore/release="/tmp/release.keystore"
          keystore/release_user="${{ secrets.KEYSTORE_ALIAS }}"
          keystore/release_password="${{ secrets.KEYSTORE_PASSWORD }}"
          EOF

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            echo "ERROR: BACKEND_URL secret is not set" >&2
            exit 1
          fi
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "BACKEND_URL target: ${{ secrets.BACKEND_URL }}"

      - name: Inject production backend URL
        run: printf '[backend]\nurl=%s\n' "${{ secrets.BACKEND_URL }}" > app_config.cfg

      - name: Print release keystore SHA-1
        run: |
          keytool -list -v \
            -keystore /tmp/release.keystore \
            -alias "${{ secrets.KEYSTORE_ALIAS }}" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            2>/dev/null | grep -A1 "SHA1:" | head -2

      - name: Pre-import warmup (absorbs GDExtension restart dialog)
        run: timeout 60 godot --headless --editor --quit --path . || true

      - name: Export APK
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /tmp/release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.KEYSTORE_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          mkdir -p build/android
          godot --headless --verbose --export-release "Android" "$GITHUB_WORKSPACE/build/android/TriCogniaVille.apk"

      - name: Publish to latest release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "TriCognia Ville — Latest Build"
          files: build/android/TriCogniaVille.apk
